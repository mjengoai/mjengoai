<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="0; url=https://mjengoai.github.io/Dashboard/">
  <title>MjengoAI Dashboard — Redirecting…</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0d1a0d;
      display:flex;align-items:center;justify-content:center;
      min-height:100vh;font-family:system-ui,sans-serif;
    }
    .wrap{text-align:center;padding:24px;}
    .logo{
      width:48px;height:48px;background:linear-gradient(135deg,#2e7d32,#1a5c2a);
      border-radius:12px;display:flex;align-items:center;justify-content:center;
      margin:0 auto 16px;font-weight:700;color:#fff;font-size:14px;letter-spacing:-.5px;
    }
    h1{color:#fff;font-size:18px;font-weight:600;margin-bottom:6px;}
    p{color:rgba(255,255,255,.45);font-size:13px;margin-bottom:20px;}
    .spinner{
      width:22px;height:22px;border:2.5px solid rgba(255,255,255,.1);
      border-top-color:#4caf50;border-radius:50%;
      animation:spin .7s linear infinite;margin:0 auto 14px;
    }
    a{color:#4caf50;font-size:12px;text-decoration:none;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">MJ</div>
    <div class="spinner"></div>
    <h1>Loading Dashboard…</h1>
    <p>Taking you to your MjengoAI account</p>
    <a href="https://mjengoai.github.io/Dashboard/">Click here if not redirected</a>
  </div>
  <script>
    window.location.replace('https://mjengoai.github.io/Dashboard/');
  </script>
</body>
</html>
